issues:
  exclude-dirs:
    - api
    - internal/k8s
  exclude-rules:
    - path: _test\.go$
      text: Exclude all test files
    # SA1019: CAPI 1.11 deprecated sigs.k8s.io/cluster-api/api/core/v1beta1 in favour of v1beta2.
    # The k3s provider (github.com/richardcase/cluster-api-k3s) still depends on v1beta1 and has not
    # migrated yet, so our code must remain compatible with it. These exclusions are intentional and
    # temporary — remove them once the k3s provider upgrades to v1beta2.
    - path: ^(cmd/template-controller/main\.go|internal/(cluster/.*\.go|common/.*\.go|controller/.*\.go|providers/.*\.go|rest/.*\.go|webhook/v1alpha1/.*\.go))$
      text: SA1019

run:
  timeout: 5m
  tests: false # Skip linter checks on unit test files

linters-settings:
  dupl:
    threshold: 200 # TODO: reduce to 100
  misspell:
    locale: US
  cyclop:
    max-complexity: 24 # TODO: gradually lower these values to 10/5.0
    package-average: 10

  unparam:
    check-exported: false

  gosec:
    includes:
      - G401
      - G306
      - G101
      - G102
      - G103
      - G104
      - G106
      - G107
      - G108
      - G109
      - G110

linters:
  fast: false
  disable-all: false
  enable:
    #    - bodyclose # false positives, even with nolint directive applied
    - cyclop
    - dupl
    - errcheck
    - gofmt
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - goimports
