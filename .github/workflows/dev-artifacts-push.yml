---

name: Push development artifacts to the Release Service

on:
  # manual trigger from the Actions tab
  workflow_dispatch:

env:
  VERSION_SUFFIX: -test

permissions:
  contents: read

jobs:
  dev-artifacts-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Build Docker image
        run: |
          make docker-build

      - name: Build Helm chart
        run: |
          make helm-build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v4.0.1
        with:
          aws-access-key-id: ${{ secrets.NO_AUTH_ECR_PUSH_USERNAME }}
          aws-secret-access-key: ${{ secrets.NO_AUTH_ECR_PUSH_PASSWD }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5
        with:
          registries: "080137407410"

      - name: Push Docker image
        run: |
          make docker-push

      - name: Push Helm chart
        run: |
          make helm-push
