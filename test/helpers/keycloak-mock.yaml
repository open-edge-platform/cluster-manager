#
# mock Keycloak with init container for key generation
# keys are stored in ephemeral emptyDir volume (never touch host filesystem)
---
apiVersion: v1
kind: Namespace
metadata:
  name: orch-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-keycloak-config
  namespace: orch-platform
data:
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ =404;
            add_header Content-Type application/json;
        }

        location /realms/master/protocol/openid-connect/token {
            # Proxy to token server that generates real JWT tokens dynamically
            proxy_pass http://localhost:8082/token;
            proxy_set_header Content-Type application/x-www-form-urlencoded;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://localhost:8082/health;
        }

        location /realms/master/protocol/openid-connect/certs {
            add_header Content-Type application/json;
            alias /shared/jwks.json;
        }

        # Admin API endpoints for client management (used by TTL enforcement)
        # Order matters in nginx - most specific first!

        # List clients by clientId query parameter
        location = /admin/realms/master/clients {
            add_header Content-Type application/json;
            return 200 '[{"id":"mock-client-uuid","clientId":"test-client","enabled":true,"attributes":{"access.token.lifespan":"10800"}}]';
        }

        # Get/Update specific client by UUID
        location ~ ^/admin/realms/master/clients/[a-z0-9\-]+$ {
            add_header Content-Type application/json;
            if ($request_method = GET) {
                return 200 '{"id":"mock-client-uuid","clientId":"test-client","enabled":true,"attributes":{"access.token.lifespan":"10800"}}';
            }
            if ($request_method = PUT) {
                return 204;
            }
            return 405;
        }
    }
  # generat RSA keys and JWK
  generate-keys.sh: |
    #!/bin/sh
    set -e

    KEY_DIR="/shared"
    PRIVATE_KEY="$KEY_DIR/test_private_key.pem"
    JWK_FILE="$KEY_DIR/jwks.json"
    KEY_ID="test-key-$(date +%s)"

    echo "Generating RSA key pair for JWT signing..."

    # Generate 2048-bit RSA private key (faster for testing)
    openssl genpkey -algorithm RSA -out "$PRIVATE_KEY" -pkeyopt rsa_keygen_bits:2048

    # Generate JWK from private key
    # Extract modulus (n) and exponent (e) directly from private key
    MODULUS=$(openssl rsa -in "$PRIVATE_KEY" -noout -modulus | cut -d= -f2 | xxd -r -p | base64 | tr -d '\n' | tr '+/' '-_' | tr -d '=')
    EXPONENT=$(echo "AQAB") # RSA exponent is always 65537 = AQAB in base64

    # Create JWK JSON
    cat > "$JWK_FILE" <<EOF
    {
      "keys": [
        {
          "kty": "RSA",
          "kid": "$KEY_ID",
          "use": "sig",
          "alg": "PS512",
          "n": "$MODULUS",
          "e": "$EXPONENT"
        }
      ]
    }
    EOF

    echo "$KEY_ID" > "$KEY_DIR/key_id.txt"
    echo "Keys generated with key ID: $KEY_ID"

  # generate JWTs dynamically
  token-server.sh: |
    #!/bin/sh
    set -e

    PRIVATE_KEY_PATH="/shared/test_private_key.pem"
    KEY_ID_PATH="/shared/key_id.txt"
    PORT=8082

    # Read key ID
    if [ -f "$KEY_ID_PATH" ]; then
        KEY_ID=$(cat "$KEY_ID_PATH" | tr -d '\n')
    else
        KEY_ID="test-key-$(date +%s)"
    fi

    echo "Token server starting with key ID: $KEY_ID"

    # Create request handler script
    cat > /tmp/handle_request.sh <<EOF
    #!/bin/sh
    PRIVATE_KEY_PATH="/shared/test_private_key.pem"
    KEY_ID="$KEY_ID"

    base64url() {
        openssl base64 -e | tr -d '=' | tr '/+' '_-' | tr -d '\n'
    }

    # Generate JWT token
    generate_token() {
        local roles_json="\$1"
        local requested_exp="\$2"

        local now=\$(date +%s)
        local exp=\$((now + 86400))

        if [ -n "\$requested_exp" ]; then
            exp=\$requested_exp
        fi

        # JWT Header
        local header=\$(printf '{"alg":"PS512","typ":"JWT","kid":"%s"}' "\$KEY_ID" | base64url)

        # Default roles if not provided
        if [ -z "\$roles_json" ]; then
            roles_json='["uma_authorization","admin"]'
        fi

        # JWT Payload
        local payload=\$(cat <<PAYLOAD_EOF | base64url
    {"iss":"http://platform-keycloak.orch-platform.svc/realms/master","azp":"test-client","sub":"test-client","preferred_username":"service-account-test-client","exp":\$exp,"iat":\$now,"realm_access":{"roles":\$roles_json},"resource_access":{"realm-management":{"roles":["view-clients","manage-clients"]}}}
    PAYLOAD_EOF
    )

        # Create signature input
        local signing_input="\${header}.\${payload}"

        # Sign with PS512 (RSA-PSS with SHA-512)
        local signature=\$(printf '%s' "\$signing_input" | \\
      openssl dgst -sha512 -sigopt rsa_padding_mode:pss -sigopt rsa_pss_saltlen:-1 -sign "\$PRIVATE_KEY_PATH" | base64url)

        # Complete JWT
        echo "\${signing_input}.\${signature}"
    }

    # Read HTTP request
    read -r method path protocol
    method=\$(echo "\$method" | tr -d '\r')
    path=\$(echo "\$path" | tr -d '\r')

    # Read headers
    content_length=0
    while IFS=: read -r header value; do
        header=\$(echo "\$header" | tr -d '\r\n' | tr '[:upper:]' '[:lower:]')
        value=\$(echo "\$value" | tr -d '\r\n' | sed 's/^ *//')

        if [ "\$header" = "content-length" ]; then
            content_length=\$value
        fi

        # Empty line marks end of headers
        [ -z "\$header" ] && break
    done

    # Read body if present
    body=""
    if [ "\$content_length" -gt 0 ]; then
        echo "Reading body of length \$content_length" >&2
        # Use dd instead of head -c for better compatibility
        body=\$(dd bs=1 count="\$content_length" 2>/dev/null)
        echo "Body read: \$body" >&2
    fi

    # Handle health check
    if [ "\$path" = "/health" ]; then
        printf "HTTP/1.1 200 OK\r\n"
        printf "Content-Type: text/plain\r\n"
        printf "Content-Length: 2\r\n"
        printf "\r\n"
        printf "OK"
        exit 0
    fi

    # Handle token request
    if [ "\$path" = "/token" ] && [ "\$method" = "POST" ]; then
        # Check grant_type
        if echo "\$body" | grep -q "grant_type=client_credentials\|grant_type=authorization_code"; then

            # Extract roles from body if present
            roles_json=""
            if echo "\$body" | grep -q "roles="; then
                roles_encoded=\$(echo "\$body" | sed -n 's/.*roles=\([^&]*\).*/\1/p')
                if [ -n "\$roles_encoded" ]; then
                    # Decode %2C to , and quote for JSON
                    roles_csv=\$(echo "\$roles_encoded" | sed 's/%2C/,/g' | sed 's/%2c/,/g')
                    roles_quoted=\$(echo "\$roles_csv" | sed 's/,/","/g')
                    roles_json="[\"\$roles_quoted\"]"
                fi
            fi

            # Extract exp from body if present
            exp_val=""
            if echo "\$body" | grep -q "exp="; then
                 exp_val=\$(echo "\$body" | sed -n 's/.*exp=\([^&]*\).*/\1/p')
            fi

            token=\$(generate_token "\$roles_json" "\$exp_val")
            response=\$(printf '{"access_token":"%s","token_type":"Bearer","expires_in":86400}' "\$token")
            response_length=\$(printf '%s' "\$response" | wc -c)

            printf "HTTP/1.1 200 OK\r\n"
            printf "Content-Type: application/json\r\n"
            printf "Content-Length: %d\r\n" "\$response_length"
            printf "\r\n"
            printf "%s" "\$response"
        else
            error='{"error":"unsupported_grant_type"}'
            error_length=\$(printf '%s' "\$error" | wc -c)

            printf "HTTP/1.1 400 Bad Request\r\n"
            printf "Content-Type: application/json\r\n"
            printf "Content-Length: %d\r\n" "\$error_length"
            printf "\r\n"
            printf "%s" "\$error"
        fi
        # Wait for buffer flush
        sleep 0.1
        exit 0
    fi

    # 404 for other paths
    error='{"error":"not_found"}'
    error_length=\$(printf '%s' "\$error" | wc -c)
    printf "HTTP/1.1 404 Not Found\r\n"
    printf "Content-Type: application/json\r\n"
    printf "Content-Length: %d\r\n" "\$error_length"
    printf "\r\n"
    printf "%s" "\$error"
    EOF

    chmod +x /tmp/handle_request.sh

    # Run HTTP server using nc
    # try with -e flag first (some busybox builds have it), fall back to FIFO method
    echo "Mock Keycloak token server listening on port $PORT"
    if nc -h 2>&1 | grep -q '\-e'; then
        # nc supports -e flag - use with -k for persistent connections
        while true; do
            nc -lk -p $PORT -e /tmp/handle_request.sh || true
            sleep 0.1
        done
    else
        # nc doesn't support -e, use FIFO
        FIFO=/tmp/nc_fifo
        while true; do
            rm -f $FIFO
            mkfifo $FIFO
            nc -l -p $PORT < $FIFO | /tmp/handle_request.sh > $FIFO 2>&1 || true
            sleep 0.1
        done
    fi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-keycloak-content
  namespace: orch-platform
data:
  "openid-configuration": |
    {
      "issuer": "http://platform-keycloak.orch-platform.svc/realms/master",
      "authorization_endpoint": "http://platform-keycloak.orch-platform.svc/realms/master/protocol/openid-connect/auth",
      "token_endpoint": "http://platform-keycloak.orch-platform.svc/realms/master/protocol/openid-connect/token",
      "jwks_uri": "http://platform-keycloak.orch-platform.svc/realms/master/protocol/openid-connect/certs",
      "response_types_supported": ["code"],
      "subject_types_supported": ["public"],
      "id_token_signing_alg_values_supported": ["RS512"],
      "grant_types_supported": ["client_credentials", "authorization_code"],
      "token_endpoint_auth_methods_supported": ["client_secret_basic", "client_secret_post"],
      "scopes_supported": ["openid", "profile", "email", "roles"]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-keycloak
  namespace: orch-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-keycloak
  template:
    metadata:
      labels:
        app: platform-keycloak
    spec:
      # to generate RSA keys at pod startup
      initContainers:
      - name: keygen
        image: alpine/openssl:3.5.4
        command: ["/bin/sh", "/scripts/generate-keys.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: shared-keys
          mountPath: /shared
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
      containers:
      # sidecar: to generate JWTs dynamically
      - name: token-server
        image: alpine/openssl:3.5.4
        command: ["/bin/sh", "/scripts/token-server.sh"]
        ports:
        - containerPort: 8082
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: shared-keys
          mountPath: /shared
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      # main container: nginx reverse proxy
      - name: mock-keycloak
        image: nginx:alpine-slim
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: content-volume
          mountPath: /usr/share/nginx/html/realms/master/.well-known
        - name: shared-keys
          mountPath: /shared
        - name: nginx-tmp
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        securityContext:
          runAsNonRoot: true
          runAsUser: 101  # nginx user
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config-volume
        configMap:
          name: mock-keycloak-config
      - name: content-volume
        configMap:
          name: mock-keycloak-content
      - name: scripts
        configMap:
          name: mock-keycloak-config
          defaultMode: 0555
      - name: shared-keys
        emptyDir:
          medium: Memory  # store in RAM for extra security
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: platform-keycloak
  namespace: orch-platform
spec:
  selector:
    app: platform-keycloak
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
