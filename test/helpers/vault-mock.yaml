#
# Mock Vault service for service tests
# Returns test M2M credentials when cluster-manager tries to authenticate
---
apiVersion: v1
kind: Namespace
metadata:
  name: orch-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-mock-response
  namespace: orch-platform
data:
  login-response.json: |
    {
      "auth": {
        "client_token": "mock-vault-token",
        "accessor": "mock-accessor",
        "policies": ["default"],
        "lease_duration": 3600
      }
    }
  credentials-response.json: |
    {
      "data": {
        "data": {
          "client_id": "test-client",
          "client_secret": "test-secret"
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-mock
  namespace: orch-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-mock
  template:
    metadata:
      labels:
        app: vault-mock
    spec:
      containers:
      - name: mock-server
        image: busybox:1.37
        volumeMounts:
        - name: vault-mock-data
          mountPath: /etc/vault-mock
        command:
          - /bin/sh
          - -c
          - |
            rm -f /tmp/pipe
            mkfifo /tmp/pipe
            echo "Starting mock Vault server on port 8200..."
            while true; do
              cat /tmp/pipe | nc -l -p 8200 | (
                read request_line
                echo "[Vault Mock] $request_line"
                if echo "$request_line" | grep -q "POST /v1/auth/kubernetes/login"; then
                   echo -ne "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n" > /tmp/pipe
                   cat /etc/vault-mock/login-response.json >> /tmp/pipe
                elif echo "$request_line" | grep -q "GET /v1/kv/data/"; then
                   echo -ne "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n" > /tmp/pipe
                   cat /etc/vault-mock/credentials-response.json >> /tmp/pipe
                elif echo "$request_line" | grep -q "GET /v1/secret/data/"; then
                   echo -ne "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n" > /tmp/pipe
                   cat /etc/vault-mock/credentials-response.json >> /tmp/pipe
                else
                   echo -ne "HTTP/1.1 404 Not Found\r\n\r\n" > /tmp/pipe
                fi
              )
            done
        ports:
        - containerPort: 8200
      volumes:
      - name: vault-mock-data
        configMap:
          name: vault-mock-response
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: orch-platform
spec:
  selector:
    app: vault-mock
  ports:
  - port: 8200
    targetPort: 8200
