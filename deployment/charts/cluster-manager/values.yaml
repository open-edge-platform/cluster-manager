global:
  registry: {} # TODO: Add correct registry
  # name:
  imagePullSecrets: []

kubernetesClusterDomain: cluster.local

# This is to override the chart name.
nameOverride: ""
fullNameOverride: ""
registry: {}
# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

curlImage:
  name: badouralix/curl-jq@sha256
  tag: fe8a5ee49f613495df3b57afa86b39f081bd1b3b9ed61248f46c3d3d7df56092
  pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 16Mi

clusterManager:
  image:
    registry:
      name: registry-rs.edgeorchestration.intel.com
    #  name:
    #  imagePullSecrets: []
    repository: edge-orch/cluster/cluster-manager
    pullPolicy: IfNotPresent
    tag: ""

  replicaCount: 1

  resources:
    limits:
      cpu: 1
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 128Mi

  readinessProbe:
    httpGet:
      path: /v2/healthz
      port: 8080

  clientRateLimiter:
    qps: "50"
    burst: "200"

  # This is for setting Kubernetes Annotations to a Pod.
  podAnnotations: {}

  # This is for setting Kubernetes Labels to a Pod.
  podLabels: {}

  ## Configure Pods Security Context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  ## Configure Container Security Context (only main container)
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
      - "ALL"

  # Additional command line flags to pass.
  extraArgs:
    disable-auth: false
    disable-multi-tenancy: false
    disable-inventory: false
    disable-metrics: true
    default-template: "baseline-k3s-v0.0.10"
    # TTL in hours for JWT tokens in generated kubeconfig files
    # 0 = immediate expiration (disables kubeconfig)
    # Actual TTL can be limited by Keycloak's realm-level max token lifetime settings
    kubeconfig-ttl-hours: 3

  extraEnv: []

  args:
    loglevel: 0
    logformat: human
    # systemLabelsPrefixes: edge-orchestrator.intel.com,cluster.x-k8s.io,topology.cluster.x-k8s.io,fluentBitLoggingHost,prometheusMetricsURL
    clusterdomain: kind.internal
    username: admin
    inventory: inventory.orch-infra.svc.cluster.local:50051
    # URL of the Nexus project service used to resolve project names to UUIDs
    nexusApiUrl: "http://svc-iam-nexus-api-gw.orch-iam.svc.cluster.local:8082"

  service:
    rest:
      port: 8080

templateController:
  image:
    registry:
      name: registry-rs.edgeorchestration.intel.com
    #  name:
    #  imagePullSecrets: []
    repository: edge-orch/cluster/template-controller
    pullPolicy: IfNotPresent
    tag: ""

  replicaCount: 1

  resources:
    limits:
      cpu: 1
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 128Mi

  # This is for setting Kubernetes Annotations to a Pod.
  podAnnotations: {}

  # This is for setting Kubernetes Labels to a Pod.
  podLabels: {}

  ## Configure Pods Security Context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  ## Configure Container Security Context (only main container)
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - "ALL"

  # Additional command line flags to pass.
  extraArgs:
    - "--webhook-enabled=true"

  extraEnv: []

  args:
    loglevel: "-loglevel=0"
    logformat: "-logformat=human"

metrics:
  enabled: false
  service:
    port: 8080
    labels:
      templateController:
        app: "template-controller-metrics-svc"
  serviceMonitor:
    labels: {}
  dashboardAdminFolder: orchestrator

webhookService:
  enabled: true
  type: ClusterIP
  ports:
    - name: webhook-server
      port: 443
      targetPort: 9443
      protocol: TCP

customDefaultTemplates:
# my-custom-template.json: |-
#   {
#     "name": "sample",
#     "version": "v1.0.0",
#     **etc**
#   }

service:
  opa:
    enabled: true
    type: ClusterIP
    port: 8111


openidc:
  issuer: http://platform-keycloak.orch-platform.svc/realms/master
  insecureSkipVerify: false

openpolicyagent:
  enabled: true
  port: 8181
  image: openpolicyagent/opa
  tag: 1.2.0
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  security:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - "ALL"

# co-manager M2M client configuration
credentialsM2M:
  enabled: false  # avoid test regression as services are unavailable

  istio:
    enabled: false         # Set true when Istio sidecar injection is enabled
    sidecarWaitTimeout: 60 # Seconds to wait for sidecar readiness

  job:
    # job execution settings
    backoffLimit: 3
    activeDeadlineSeconds: 300  # timeout 5 minutes
    ttlSecondsAfterFinished: 86400  # auto-deletion 24 hours
    retryAttempts: 5
    retryDelay: 10

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # platform services configuration
  vault:
    service: "vault.orch-platform.svc"
    port: 8200
    secretPath: "secret/data/co-manager-m2m-client-secret"
    authPath: "auth/kubernetes"

  keycloak:
    service: "platform-keycloak.orch-platform.svc"
    port: 8080
    realm: "master"
    adminSecretName: "platform-keycloak"
    adminSecretNamespace: "orch-platform"
    clientId: "co-manager-m2m-client"
